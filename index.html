<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACOUSTIC PIPE MONITOR</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

:root{
  --bg:#0d1117;
  --panel:#161b22;
  --card:#1c2128;
  --border:#30363d;
  --green:#39d353;
  --cyan:#58a6ff;
  --amber:#e3b341;
  --purple:#bc8cff;
  --text:#e6edf3;
  --muted:#8b949e;
  --font-mono:'Space Mono', monospace;
  --font-body:'DM Sans', sans-serif;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
}

.header{
  background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:16px 20px;
  display:flex;
  align-items:center;
  gap:12px;
}

.header-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 10px var(--green);
}

.content{
  padding:20px;
}

.grid-3{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:15px;
}

.metric{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px;
}

.metric-label{
  font-size:10px;
  color:var(--muted);
  margin-bottom:5px;
  font-family:var(--font-mono);
}

.metric-value{
  font-size:24px;
  font-weight:bold;
  font-family:var(--font-mono);
}

.waveform{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px;
  margin-top:15px;
}

.alert-box{
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
  font-family:var(--font-mono);
}

.alert-ok{
  background:#0d2818;
  color:var(--green);
}

.alert-warn{
  background:#2a1f00;
  color:var(--amber);
}

.btn-action{
  padding:10px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-right:10px;
  font-weight:bold;
}

.btn-normal{
  background:#30363d;
  color:white;
}

.btn-ar{
  background:#e3b341;
  color:black;
}

.history-table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

.history-table th,
.history-table td{
  border:1px solid var(--border);
  padding:8px;
  font-size:12px;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-dot"></div>
  <div>
    <h3>ACOUSTIC PIPE MONITOR</h3>
    <small>RENDER + ESP32-S3 + AIVEN MYSQL</small>
  </div>
</div>

<div class="content">
  <div id="alert-container">
    <div class="alert-box alert-ok">
      ▶ MONITORAMENTO ATIVO
    </div>
  </div>

  <div class="grid-3">
    <div class="metric">
      <div class="metric-label">FREQUÊNCIA</div>
      <div class="metric-value" id="freq-val" style="color:var(--cyan)">0</div>
    </div>
    <div class="metric">
      <div class="metric-label">VIBRAÇÃO</div>
      <div class="metric-value" id="vib-val" style="color:var(--green)">0.12</div>
    </div>
    <div class="metric">
      <div class="metric-label">RMS</div>
      <div class="metric-value" id="rms-val" style="color:var(--purple)">0</div>
    </div>
  </div>

  <div class="waveform">
    <canvas id="fftCanvas" height="100"></canvas>
  </div>

  <div style="margin-top:15px">
    <button class="btn-action btn-normal" onclick="inserirDadoManual(80,30,false)">
      INJETAR NORMAL
    </button>
    <button class="btn-action btn-ar" onclick="inserirDadoManual(1850,60,true)">
      INJETAR AR
    </button>
  </div>

  <div class="waveform">
    <table class="history-table">
      <thead>
        <tr>
          <th>HORA</th>
          <th>FREQUÊNCIA</th>
          <th>STATUS</th>
        </tr>
      </thead>
      <tbody id="corpoTabela"></tbody>
    </table>
  </div>
</div>

<script>
// --- ATENÇÃO: SUBSTITUA PELA URL QUE O RENDER VAI TE FORNECER ---
const API_URL = "https://acustico.onrender.com/api/leituras";

let ultimaFreq = 80;
let isAr = false;

Notification.requestPermission();

async function inserirDadoManual(freq, amp, ar){
  const payload = {
    frequencia_hz: freq,
    amplitude_db: amp,
    detectou_ar: ar
  };

  try{
    const response = await fetch(API_URL,{
      method:'POST',
      mode:'cors',
      headers:{
        'Content-Type':'application/json' // Removido o header do Ngrok
      },
      body:JSON.stringify(payload)
    });

    if(!response.ok){
      throw new Error("Erro POST");
    }
    console.log("✅ Inserido");
    await buscarDadosDoBanco();
  }catch(error){
    console.error("❌ POST:", error);
  }
}

async function buscarDadosDoBanco(){
  try{
    const response = await fetch(API_URL,{
      method:'GET',
      mode:'cors' // Removido o header do Ngrok
    });

    if(!response.ok){
      throw new Error("Erro GET");
    }

    const dados = await response.json();
    if(!dados || dados.length === 0) return;

    const atual = dados[0];
    ultimaFreq = atual.frequencia_hz || 0;
    isAr = atual.detectou_ar || false;

    document.getElementById('freq-val').innerText = ultimaFreq;
    document.getElementById('rms-val').innerText = atual.amplitude_db || 0;

    const alertBox = document.getElementById('alert-container');

    if(isAr){
      alertBox.innerHTML = `
      <div class="alert-box alert-warn">
      ⚠ ENTRADA DE AR DETECTADA
      </div>`;
      if(Notification.permission === "granted"){
        new Notification("⚠ Entrada de ar detectada");
      }
    }else{
      alertBox.innerHTML = `
      <div class="alert-box alert-ok">
      ▶ SISTEMA NORMAL
      </div>`;
    }

    const corpo = document.getElementById('corpoTabela');
    corpo.innerHTML = "";

    dados.slice(0,10).forEach(item=>{
      const hora = new Date(item.timestamp_leitura).toLocaleTimeString('pt-BR');
      corpo.innerHTML += `
      <tr>
        <td>${hora}</td>
        <td>${item.frequencia_hz} Hz</td>
        <td>
          ${item.detectou_ar
            ? '<span style="color:orange">AR</span>'
            : '<span style="color:lime">OK</span>'}
        </td>
      </tr>
      `;
    });
  }catch(error){
    console.error("❌ GET:", error);
  }
}

const canvas = document.getElementById('fftCanvas');
const ctx = canvas.getContext('2d');

function desenharFFT(){
  const w = canvas.clientWidth || 600;
  const h = 100;
  canvas.width = w;
  canvas.height = h;

  ctx.fillStyle = '#010409';
  ctx.fillRect(0,0,w,h);

  const bins = 60;
  const bw = w / bins;

  for(let i=0;i<bins;i++){
    const hz = (i/bins)*4000;
    const dist = Math.abs(hz - ultimaFreq);
    const amp = Math.exp(-(dist*dist)/(2*700*700));
    const barHeight = amp * (isAr ? 90 : 50);

    ctx.fillStyle = isAr ? '#e3b341' : '#58a6ff';
    ctx.fillRect(i*bw, h-barHeight, bw-1, barHeight);
  }
  requestAnimationFrame(desenharFFT);
}

desenharFFT();
buscarDadosDoBanco();

setInterval(()=>{
  buscarDadosDoBanco();
},3000);

</script>
</body>
</html>
